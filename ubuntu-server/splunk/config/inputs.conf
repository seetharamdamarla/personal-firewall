# ============================================================
# Personal Firewall — Splunk Universal Forwarder Inputs
# Location: /opt/splunkforwarder/etc/system/local/inputs.conf
# ============================================================

# Suricata EVE JSON alerts
[monitor:///var/log/suricata/eve.json]
disabled = false
index = idx_suricata
sourcetype = suricata:eve
host = ubuntu-server

# Wazuh alerts JSON
[monitor:///var/ossec/logs/alerts/alerts.json]
disabled = false
index = idx_wazuh
sourcetype = wazuh:alerts
host = ubuntu-server

# SSH auth log
[monitor:///var/log/auth.log]
disabled = false
index = idx_firewall
sourcetype = linux:auth
host = ubuntu-server

# Personal Firewall block log
[monitor:///var/log/personal-firewall/blocks.jsonl]
disabled = false
index = idx_firewall
sourcetype = pf:blocks
host = ubuntu-server

# Personal Firewall packet sniffer log
[monitor:///var/log/personal-firewall/packets.jsonl]
disabled = false
index = idx_firewall
sourcetype = pf:packets
host = ubuntu-server
